name: Monthly ETL Pipeline

on:
  schedule:
    # Run at 2:00 AM UTC on the 1st of each month
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Run specific source only (census/bls/redfin/fred) or leave blank for all'
        required: false
        default: ''
      scores_only:
        description: 'Only recalculate scores (skip data fetch)'
        type: boolean
        default: false

jobs:
  etl-pipeline:
    name: Run ETL Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ETL pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          if [ "${{ inputs.scores_only }}" = "true" ]; then
            npx tsx etl/run-pipeline.ts --scores-only
          elif [ -n "${{ inputs.source }}" ]; then
            npx tsx etl/run-pipeline.ts --source=${{ inputs.source }}
          else
            npx tsx etl/run-pipeline.ts
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "ETL pipeline failed at $(date -u)"
          echo "Check GitHub Actions logs for details"
          # Add Slack/email notification here if needed
